<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evolution API Dashboard</title>
    <style>
      body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: #0f172a; 
        color: #f8fafc; 
        margin: 0; 
        padding: 20px; 
        line-height: 1.5;
      }
      .container { max-width: 800px; margin: 0 auto; }
      h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; font-size: 2.5rem; }
      h2 { margin-top: 0; font-size: 1.25rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
      .card { 
        background: #1e293b; 
        padding: 24px; 
        border-radius: 16px; 
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); 
        margin-bottom: 24px; 
        border: 1px solid #334155;
      }
      .instance { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        border-bottom: 1px solid #334155; 
        padding: 16px 0; 
      }
      .instance:last-child { border-bottom: none; }
      .status-badge {
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        background: #334155;
        color: #cbd5e1;
      }
      .btn { 
        padding: 10px 20px; 
        border-radius: 8px; 
        border: none; 
        cursor: pointer; 
        background: #38bdf8; 
        color: #0f172a; 
        font-weight: 600;
        transition: all 0.2s;
        font-size: 0.875rem;
      }
      .btn:hover { background: #7dd3fc; transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }
      .btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; }
      .btn-danger { background: #ef4444; color: white; }
      .btn-danger:hover { background: #f87171; }
      .qr-container { text-align: center; margin-top: 20px; }
      .qr-container img { 
        border: 8px solid white; 
        border-radius: 12px; 
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        margin: 20px 0;
      }
      input { 
        padding: 12px 16px; 
        background: #0f172a; 
        border: 1px solid #334155; 
        border-radius: 8px; 
        color: white; 
        width: 100%; 
        box-sizing: border-box; 
        margin-bottom: 20px;
        font-size: 1rem;
        transition: border-color 0.2s;
      }
      input:focus { outline: none; border-color: #38bdf8; ring: 2px #38bdf8; }
      label { display: block; margin-bottom: 8px; font-size: 0.875rem; color: #94a3b8; font-weight: 500; }
      p { color: #94a3b8; }
    </style>
